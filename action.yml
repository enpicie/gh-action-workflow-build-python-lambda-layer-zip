name: 'Build Lambda Layer Zip and Upload to S3'
description: 'Builds Lambda layer ZIP from requirements.txt, hashes the artifact, and uploads to S3 only if the artifact hash differs.'

inputs:
  requirements_path:
    description: 'Path to requirements.txt file'
    required: true
  app_name:
    description: 'Name of application (used in .zip name)'
    required: true
  python_runtime:
    description: 'Python runtime version Layers are built for (e.g., 3.11)'
    required: true
  s3_layer_bucket_name:
    description: 'Name of the S3 bucket to upload the ZIP file to'
    required: false
    default: 'lambda.layer.python3'
  aws_region:
    description: 'AWS region for S3 bucket'
    required: false
    default: 'us-east-2'
  aws_role_arn:
    description: 'ARN of AWS IAM role to assume for S3 access'
    required: true
  architecture:
    description: 'Lambda architecture to build for (x86_64 or arm64)'
    required: false
    default: 'x86_64'
  force_rebuild:
    description: 'Force a rebuild even if requirements.txt has not changed'
    required: false
    default: 'false'

outputs:
  zip_file_name:
    description: 'Final ZIP file name including .zip extension'
    value: ${{ steps.set-zip-and-s3.outputs.zip_file_name }}
  s3_artifact_key:
    description: 'Full S3 key for the uploaded ZIP artifact'
    value: ${{ steps.set-zip-and-s3.outputs.s3_artifact_key }}
  s3_requirements_key:
    description: 'Full S3 key for the uploaded requirements.txt'
    value: ${{ steps.set-zip-and-s3.outputs.s3_requirements_key }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Generate ZIP file name and S3 key
      id: set-zip-and-s3
      shell: bash
      run: |
        runtime_sanitized=$(echo "${{ inputs.python_runtime }}" | tr -d '.')
        arch="${{ inputs.architecture }}"
        if [ "$arch" = "arm64" ]; then
          docker_platform="linux/arm64"
        else
          docker_platform="linux/amd64"
        fi
        zip_file="${{ inputs.app_name }}-${runtime_sanitized}-${arch}.zip"
        s3_prefix="applayers/${{ inputs.app_name }}-${runtime_sanitized}-${arch}"
        s3_key="${s3_prefix}.zip"
        s3_requirements_key="${s3_prefix}.requirements.txt"

        echo "🔹 Python runtime: ${{ inputs.python_runtime }}"
        echo "🔹 Architecture: $arch"
        echo "🔹 Docker platform: $docker_platform"
        echo "🔹 Sanitized runtime: $runtime_sanitized"
        echo "🔹 Generated ZIP: $zip_file"
        echo "🔹 S3 prefix: $s3_prefix"
        echo "🔹 S3 key: $s3_key"
        echo "🔹 S3 requirements key: $s3_requirements_key"

        echo "ZIP_FILE_NAME=$zip_file" >> $GITHUB_ENV
        echo "S3_KEY=$s3_key" >> $GITHUB_ENV
        echo "S3_REQUIREMENTS_KEY=$s3_requirements_key" >> $GITHUB_ENV
        echo "DOCKER_PLATFORM=$docker_platform" >> $GITHUB_ENV

        echo "zip_file_name=$zip_file" >> $GITHUB_OUTPUT
        echo "s3_artifact_key=$s3_key" >> $GITHUB_OUTPUT
        echo "s3_requirements_key=$s3_requirements_key" >> $GITHUB_OUTPUT

    - name: Fetch previous requirements.txt from S3 (if any)
      id: fetch-prev-requirements
      continue-on-error: true
      shell: bash
      run: |
        REQUIREMENTS_S3_URI="s3://${{ inputs.s3_layer_bucket_name }}/${S3_REQUIREMENTS_KEY}"
        echo "🔹 Checking for previous requirements at $REQUIREMENTS_S3_URI"
        aws s3 cp "$REQUIREMENTS_S3_URI" prev.requirements.txt \
          && echo "✅ Previous requirements.txt downloaded" \
          || echo "⚠️ No previous requirements.txt found (first run or missing file)"

    - name: Compare requirements
      id: check-requirements
      shell: bash
      run: |
        if [ "${{ inputs.force_rebuild }}" = "true" ]; then
          echo "✅ Force rebuild requested — will build new layer."
          echo "REQUIREMENTS_CHANGED=true" >> $GITHUB_ENV
        elif [ -f prev.requirements.txt ] && diff -q "${{ inputs.requirements_path }}" prev.requirements.txt > /dev/null 2>&1; then
          echo "🟡 requirements.txt unchanged — skipping build."
          echo "REQUIREMENTS_CHANGED=false" >> $GITHUB_ENV
        else
          echo "✅ requirements.txt changed — will build new layer."
          echo "REQUIREMENTS_CHANGED=true" >> $GITHUB_ENV
        fi

    - name: Prepare build directory
      if: env.REQUIREMENTS_CHANGED == 'true'
      shell: bash
      run: |
        echo "🔹 Preparing build directory..."
        rm -rf layer
        mkdir -p layer/python

    - name: Set up QEMU for cross-architecture builds
      if: env.REQUIREMENTS_CHANGED == 'true' && inputs.architecture == 'arm64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Install dependencies in Docker
      if: env.REQUIREMENTS_CHANGED == 'true'
      shell: bash
      run: |
        echo "🔹 Installing dependencies for Python ${{ inputs.python_runtime }} on $DOCKER_PLATFORM..."
        docker run --rm \
          --platform "$DOCKER_PLATFORM" \
          -v "$PWD":/app -w /app \
          --user $(id -u):$(id -g) \
          public.ecr.aws/lambda/python:${{ inputs.python_runtime }}-${{ inputs.architecture }} \
          bash -c "pip install -r ${{ inputs.requirements_path }} -t layer/python && echo '✅ pip install completed successfully'"
        echo "🔹 Installed dependencies:"
        ls -1 layer/python | head -20 || echo "⚠️ No packages found in layer/python"

    - name: Zip dependencies
      if: env.REQUIREMENTS_CHANGED == 'true'
      shell: bash
      run: |
        echo "🔹 Silently zipping dependencies into $ZIP_FILE_NAME..."
        cd layer && zip -r "../$ZIP_FILE_NAME" python > /dev/null && cd ..
        echo "✅ Created ZIP: $(du -h "$ZIP_FILE_NAME")"

    - name: Upload new artifact and requirements to S3
      if: env.REQUIREMENTS_CHANGED == 'true'
      shell: bash
      run: |
        ZIP_S3_URI="s3://${{ inputs.s3_layer_bucket_name }}/$S3_KEY"
        REQUIREMENTS_S3_URI="s3://${{ inputs.s3_layer_bucket_name }}/${S3_REQUIREMENTS_KEY}"

        echo "🔹 Uploading ZIP to $ZIP_S3_URI..."
        aws s3 cp "$ZIP_FILE_NAME" "$ZIP_S3_URI" --no-progress \
          && echo "✅ ZIP uploaded successfully."

        echo "🔹 Uploading requirements.txt to $REQUIREMENTS_S3_URI..."
        aws s3 cp "${{ inputs.requirements_path }}" "$REQUIREMENTS_S3_URI" --no-progress --content-type "text/plain" \
          && echo "✅ requirements.txt uploaded successfully."
